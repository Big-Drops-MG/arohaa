name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/database/**"
      - "pnpm-lock.yaml"
      - "scripts/deploy-api-aws.py"
      - "scripts/terraform-bootstrap-state.py"
      - "scripts/terraform-import-existing.py"
      - "terraform/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
      TF_VAR_redis_url: ${{ secrets.REDIS_URL }}
      TF_VAR_clickhouse_url: http://137.184.17.135:8123
      TF_VAR_clickhouse_user: arohaa
      TF_VAR_clickhouse_password: ${{ secrets.CLICKHOUSE_PASSWORD }}
      TF_VAR_api_container_aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      TF_VAR_api_container_aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_arohaa_internal_api_secret: ${{ secrets.AROHAA_INTERNAL_API_SECRET }}
      TF_VAR_cloudwatch_alarm_sns_arn: ${{ secrets.CLOUDWATCH_ALARM_SNS_ARN }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          missing=0
          for name in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY DATABASE_URL REDIS_URL CLICKHOUSE_PASSWORD AROHAA_INTERNAL_API_SECRET; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add the secrets under Settings → Secrets and variables → Actions, then re-run this workflow."
            exit 1
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          AROHAA_INTERNAL_API_SECRET: ${{ secrets.AROHAA_INTERNAL_API_SECRET }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_REGISTRY: 442042553666.dkr.ecr.us-east-1.amazonaws.com
          IMAGE_TAG: latest
        run: |
          docker build -f apps/api/Dockerfile -t "$ECR_REGISTRY/arohaa-api:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/arohaa-api:$IMAGE_TAG"

      - name: Roll out ECS service
        run: |
          aws ecs update-service \
            --cluster arohaa-production \
            --service arohaa-api-service-syjf98zg \
            --force-new-deployment \
            --query "service.deployments[0].rolloutState" \
            --output text

      - name: Bootstrap remote state backend
        run: python scripts/terraform-bootstrap-state.py

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Apply Terraform (ECS + monitoring)
        working-directory: terraform
        run: |
          terraform init
          python ../scripts/terraform-import-existing.py || true
          terraform apply -auto-approve
