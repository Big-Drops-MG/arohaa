version: "3.8"

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: arohaa-clickhouse
    ports:
      - "8123:8123" # HTTP port (Fastify connects here)
      - "9000:9000" # Native port
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  redis:
    image: redis:latest
    container_name: arohaa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  clickhouse_data:
  redis_data:
